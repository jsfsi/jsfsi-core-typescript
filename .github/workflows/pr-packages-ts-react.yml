name: Typescript React Pull Request

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'packages/ts-crossplatform/**'
      - 'packages/ts-react/**'
      - '.github/workflows/pr-packages-ts-react.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'

      - name: Cache npm dependencies
        uses: actions/cache@v5
        id: npm_cache
        with:
          path: |
            node_modules
          key: ${{ runner.os }}-npm-pr-${{ hashFiles('package-lock.json') }}

      - if: ${{ steps.npm_cache.outputs.cache-hit != 'true' }}
        name: Install dependencies
        run: npm run setup

      - name: Build ts-crossplatform
        working-directory: packages/ts-crossplatform
        run: npm run build

      - name: Build ts-react
        working-directory: packages/ts-react
        run: npm run build

      - name: Test ts-react
        working-directory: packages/ts-react
        run: npm run test:coverage
